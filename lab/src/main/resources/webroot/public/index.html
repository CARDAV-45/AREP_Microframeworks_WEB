<!DOCTYPE html>
<html lang="es">
<head>

    <title>Servidor Web AREP</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <h1>Servidor Web AREP</h1>
    <p>Microframework para servicios REST.</p>
    
    <h2>Endpoints disponibles:</h2>
    <ul>
        <li><a href="/App/hello?name=Pedro">/App/hello?name=Pedro</a></li>

        <button type="submit">Enviar</button>

    <div id="resultado"></div>
    
    <script src="/app.js"></script>

</html>
